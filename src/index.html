<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Image App</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>

    <main>
      <form class="form">
        <input id="input" class="input-search" type="text" placeholder="Search images...">
        <button class="btn-search" type="submit">Search</button>
      </form>
      
      <div class="loader=">
      <span class="loader-first" style="display: none;"></span>
      </div>

      <div>
        <ul class="gallery"></ul>
      </div>

      <div class="btn-cont">
        <button class="btn-loadmore" type="submit" style="display: none;">Load more</button>
      </div>

      <div class="loader">
        <span class="loader-bottom" style="display: none;"></span>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
    <script type="module" src="./js/pixabay-api.js"></script>
    <script type="module" src="./js/render-functions.js"></script>
  </body>
</html>
